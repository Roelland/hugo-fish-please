<style>
  .tank-size-input { position:absolute; opacity:0; width:0; height:0; }
  .tank-size-btn { padding:0.5rem 1.2rem; border:2px solid #ccc; border-radius:6px; cursor:pointer; font-size:inherit; background:var(--section-light-bg-color); color:var(--section-light-text-color); transition:all 0.2s; }
  .tank-size-btn:hover { border-color:var(--highlight); }
  .tank-size-input:checked + .tank-size-btn { border-color:var(--highlight); background:var(--highlight); color:var(--highlight-contrast); }
</style>

<div data-fs-success hidden style="color:#37501a; background:#d4edda; border:1px solid #86c440; padding:1rem; border-radius:6px; margin-bottom:1rem;">
  Blub! Blub blub blub blub blub. Blub blub blub blub blub blub blub.
</div>
<div data-fs-error hidden style="color:#721c24; background:#f8d7da; border:1px solid #f5c6cb; padding:1rem; border-radius:6px; margin-bottom:1rem;"></div>

<form id="contact-form-fish" style="display:flex; flex-direction:column; gap:1rem; max-width:500px;">

  <div>
    <label for="fish-name" style="display:block; margin-bottom:0.3rem; font-weight:bold;">Blub</label>
    <input type="text" id="fish-name" name="name" required data-fs-field
      style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-size:inherit; background:var(--section-light-bg-color); color:var(--section-light-text-color); box-sizing:border-box;" />
    <span data-fs-error="name" style="color:#721c24;"></span>
  </div>

  <div>
    <label for="fish-email" style="display:block; margin-bottom:0.3rem; font-weight:bold;">Blub@blub</label>
    <input type="email" id="fish-email" name="email" required data-fs-field
      style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-size:inherit; background:var(--section-light-bg-color); color:var(--section-light-text-color); box-sizing:border-box;" />
    <span data-fs-error="email" style="color:#721c24;"></span>
  </div>

  <div>
    <label for="fish-days" style="display:block; margin-bottom:0.3rem; font-weight:bold;">Blub blub blub</label>
    <input type="number" id="fish-days" name="days" min="1" required data-fs-field
      style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-size:inherit; background:var(--section-light-bg-color); color:var(--section-light-text-color); box-sizing:border-box;" />
    <span data-fs-error="days" style="color:#721c24;"></span>
  </div>

<div>
    <label style="display:block; margin-bottom:0.3rem; font-weight:bold;">Blub blub blub</label>
    <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
      <input type="radio" class="tank-size-input" id="fish-size-bowl" name="tank_size" value="Blub" required />
      <label for="fish-size-bowl" class="tank-size-btn">🫙 Blub</label>
      <input type="radio" class="tank-size-input" id="fish-size-aquarium" name="tank_size" value="Blub blub" />
      <label for="fish-size-aquarium" class="tank-size-btn">🐠 Blub blub</label>
      <input type="radio" class="tank-size-input" id="fish-size-big" name="tank_size" value="Blub blub blub" />
      <label for="fish-size-big" class="tank-size-btn">🪸 Blub blub blub</label>
    </div>
  </div>

  <div>
    <label for="fish-message" style="display:block; margin-bottom:0.3rem; font-weight:bold;">Blub blub blub</label>
    <textarea id="fish-message" name="message" rows="5" required data-fs-field
      style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-size:inherit; background:var(--section-light-bg-color); color:var(--section-light-text-color); resize:vertical; box-sizing:border-box;"></textarea>
    <span data-fs-error="message" style="color:#721c24;"></span>
  </div>

  <button type="submit" data-fs-submit-btn
    style="align-self:flex-start; padding:10px 28px; background:var(--highlight); color:var(--highlight-contrast); border:none; border-radius:6px; font-size:inherit; font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:1px; cursor:pointer;">
    Blub 🐟
  </button>

</form>

<script>
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  formspree('initForm', { formElement: '#contact-form-fish', formId: 'mgodbqrg' });
</script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
