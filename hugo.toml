baseURL = 'https://www.feedmy.fish'
defaultContentLanguage = "en"
disableKinds = ["section", "taxonomy", "term", "RSS", "robotsTXT"]
title = 'Feed My Fish - Fish Sitting Services'
theme = 'hugo-scroll'
enableEmoji = true

[params]
    favicon = "images/favicon.png"
    title = "Feed My Fish - Fish Sitting Services"
    description = "Professional fish sitting and aquarium care while you're away"
    copyright = "© Feed My Fish"
    hidedesignbyline = true
    invertSectionColors = false
    title_guard = true
    language_menu = true
    show_current_lang = true

    [params.footer]
    showContactIcons = true
    showFooterLinks = false

    [params.meta]
        keywords = "fish sitting The Hague, fish sitter Den Haag, aquarium care The Hague, fish pet sitting, aquarium sitting Netherlands, goldfish care, reef tank sitting, fish sitting Voorburg, fish sitting Rijswijk"

    [[params.contacts]]
        label = "Instagram"
        value = "@fishplease_"
        url = "https://instagram.com/feedmy.fish"
        icon = "fa-brands fa-instagram"

[languages]
  [languages.en]
    weight = 10
    languageName = "EN"
    contentDir = "content/en"
    title = "Feed My Fish - Fish Sitting in The Hague"
    [languages.en.params]
      description = "Professional fish sitting and aquarium care in The Hague. From a goldfish bowl to a full reef tank — I look after your fish while you're away. Serving The Hague, Voorburg and Rijswijk."

  [languages.nl]
    weight = 20
    languageName = "NL"
    contentDir = "content/nl"
    title = "Feed My Fish - Vis Oppas Den Haag"
    [languages.nl.params]
      description = "Professionele vis oppas en aquarium verzorging in Den Haag. Van een goudviskom tot een volledig rifaquarium — ik pas op jouw vissen terwijl jij weg bent. Actief in Den Haag, Voorburg en Rijswijk."
  [languages.fish]
    weight = 30
    languageName = "🐟"
    contentDir = "content/fish"
