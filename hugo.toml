baseURL = 'https://example.org/'
defaultContentLanguage = "en"
disableKinds = ["section", "taxonomy", "term", "RSS", "robotsTXT"]
title = 'FishPlease - Fish Sitting Services'
theme = 'hugo-scroll'
enableEmoji = true

[params]
    favicon = "images/favicon.png"
    title = "FishPlease - Fish Sitting Services"
    description = "Professional fish sitting and aquarium care while you're away"
    copyright = "© FishPlease"
    hidedesignbyline = false
    invertSectionColors = false
    title_guard = true

    [params.footer]
    showContactIcons = true
    showFooterLinks = false

    [params.meta]
        keywords = "fish sitting, fish sitter, aquarium care, pet sitting, fish care"

    [[params.contacts]]
        label = "Instagram"
        value = "@fishplease"
        url = "https://instagram.com"
        icon = "fa-brands fa-instagram"

[languages]
  [languages.en]
    weight = 10
    languageName = "English"
    contentDir = "content/en"
